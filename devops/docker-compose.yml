x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &default-restart
  restart: unless-stopped

services:
  # Container DinD - Docker daemon riêng biệt
  docker:
    image: docker:dind
    container_name: jenkins-docker
    privileged: true
    <<: *default-restart
    networks:
      jenkins_network:
        aliases:
          - docker
    environment:
      DOCKER_TLS_CERTDIR: /certs
    volumes:
      - jenkins-docker-certs:/certs/client
      - jenkins_data:/var/jenkins_home
    ports:
      - "2376:2376"
    command: --storage-driver overlay2
    logging: *default-logging
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins
    user: root
    <<: *default-restart
    depends_on:
      docker:
        condition: service_healthy
    ports:
      - "8081:8080"
      - "50000:50000"
    environment:
      JAVA_OPTS: "-Xmx768m"
      JENKINS_OPTS: "--prefix=/jenkins"
      DOCKER_HOST: tcp://docker:2376
      DOCKER_CERT_PATH: /certs/client
      DOCKER_TLS_VERIFY: "1"
    volumes:
      - jenkins_data:/var/jenkins_home
      - jenkins-docker-certs:/certs/client:ro
    networks:
      - jenkins_network
    logging: *default-logging
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:8080/jenkins/login > /dev/null",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m

volumes:
  jenkins_data:
    external: true
  jenkins-docker-certs:
    driver: local
networks:
  jenkins_network:
    driver: bridge
