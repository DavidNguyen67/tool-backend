x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &default-restart
  restart: unless-stopped

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins
    <<: *default-restart
    ports:
      - "8081:8080"
    volumes:
      - jenkins_data:/var/jenkins_home
    environment:
      JAVA_OPTS: >-
        -Xmx768m
      JENKINS_OPTS: "--prefix=/jenkins"
    networks:
      - app_network
    logging: *default-logging
    healthcheck:
      test:
        ["CMD-SHELL", "curl -sf http://localhost:8080/jenkins/login > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m

volumes:
  jenkins_data:
    driver: local

networks:
  app_network:
    driver: bridge
